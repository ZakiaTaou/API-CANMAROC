services:
  db:
    image: postgres:16-alpine
    container_name: canmaroc-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - canmaroc_db_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: canmaroc-api
    ports:
      - "5001:5000"
    environment:
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - db

volumes:
  canmaroc_db_data:
